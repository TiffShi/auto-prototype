# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:instagramdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong1234567890
app.jwt.expiration=86400000

# File Storage
app.upload.dir=uploads

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.instagram=DEBUG
logging.level.org.springframework.security=INFO