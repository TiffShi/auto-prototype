version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Persists the uploaded images across container restarts
      - backend-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # Exposing the frontend on 5173 to match your Vite setup
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads: