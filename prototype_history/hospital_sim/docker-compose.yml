version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: hospital_sim
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hospital_sim"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital_net

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/hospital_sim
      SYNC_DATABASE_URL: postgresql://admin:secret@db:5432/hospital_sim
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hospital_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080
    depends_on:
      - backend
    networks:
      - hospital_net

volumes:
  postgres_data:

networks:
  hospital_net:
    driver: bridge
