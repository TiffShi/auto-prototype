<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="dataGradH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="48" height="48" rx="10" fill="#12151a"/>
  <rect width="48" height="48" rx="10" fill="#0d2318" opacity="0.6"/>

  <!-- DB cylinder body -->
  <rect x="11" y="17" width="26" height="18" rx="1" fill="none" stroke="url(#dataGrad)" stroke-width="1.8"/>

  <!-- DB top ellipse -->
  <ellipse cx="24" cy="17" rx="13" ry="4" fill="#12151a" stroke="url(#dataGrad)" stroke-width="1.8"/>

  <!-- DB top ellipse highlight -->
  <ellipse cx="24" cy="17" rx="13" ry="4" fill="url(#dataGradH)" opacity="0.15"/>

  <!-- Mid shelf line -->
  <line x1="11" y1="26" x2="37" y2="26" stroke="url(#dataGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Bottom ellipse cap -->
  <ellipse cx="24" cy="35" rx="13" ry="4" fill="#12151a" stroke="url(#dataGrad)" stroke-width="1.8"/>

  <!-- Data row lines inside cylinder -->
  <line x1="16" y1="22" x2="32" y2="22" stroke="#34d399" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <line x1="16" y1="30" x2="28" y2="30" stroke="#34d399" stroke-width="1" opacity="0.35" stroke-linecap="round"/>

  <!-- Active LED dot top right -->
  <circle cx="34" cy="14" r="2" fill="#34d399"/>
  <circle cx="34" cy="14" r="4" fill="#34d399" opacity="0.15"/>

</svg>